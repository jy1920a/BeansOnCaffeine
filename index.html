<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BeansOnCaffeine</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: radial-gradient(circle at 50% 30%, #0a0f1c, #020611 70%);
      color:#E1E0CC;
      font-family:'Inter', sans-serif;
      height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    /* HERO TITLE */
    .hero-title {
      font-family:'Bebas Neue', sans-serif;
      font-size: clamp(60px, 10vw, 110px);
      letter-spacing:0.04em;
      text-align:center;
      background: linear-gradient(180deg,#ffffff,#7fa4ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    /* SUB TEXT */
    .cta-caption {
      margin-top:18px;
      font-size:14px;
      color:rgba(220,220,220,0.55);
      text-align:center;
      max-width:420px;
    }

    /* CTA WRAPPER */
    .cta-wrap {
      display:flex;
      justify-content:center;
      margin-top:32px;
    }

    /* BUTTON */
    .hcta {
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;

      padding:14px 24px;
      border-radius:14px;

      background: rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.12);

      font-family:'DM Mono', monospace;
      font-size:13px;
      letter-spacing:0.12em;
      text-transform:uppercase;
      color:#E1E0CC;

      transition: box-shadow 0.18s ease, color 0.18s ease;
      text-decoration:none;
    }

    /* TEXT CENTER FIX */
    .hcta-text {
      grid-column:2;
      text-align:center;
      min-width:220px;
      display:inline-block;
    }

    /* ARROW */
    .ccirc {
      grid-column:3;
      margin-left:10px;

      width:34px;
      height:34px;
      border-radius:10px;

      background:#0a0f1c;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* HOVER */
    .hcta:hover {
      color:#fff;
      box-shadow:0 0 18px rgba(140,190,255,0.25);
    }

    /* CLICK STATE */
    .hcta.initializing {
      color:#8ab4ff;
      box-shadow:0 0 28px rgba(140,190,255,0.4);
    }

    /* CURSOR BLINK */
    .hcta.initializing .hcta-text::after {
      content:" |";
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100% { opacity:0.6; }
      50% { opacity:0; }
    }
  </style>
</head>

<body>

  <div class="hero-title">
    Caffeinated AI
  </div>

  <div class="cta-caption">
    Systems. AI. Built to think clearly.
  </div>

  <div class="cta-wrap">
    <a href="https://jy1920a.github.io/BeansOnCaffeine/main.html" class="hcta" id="heroCta">
      <span class="hcta-text"
            data-idle="Built to think clearly"
            data-hover="Enter the Lab"
            data-click="Initializing...">
        Built to think clearly
      </span>
      <span class="ccirc">→</span>
    </a>
  </div>

  <script>
    const cta = document.getElementById('heroCta');
    const text = cta.querySelector('.hcta-text');

    const idle = text.dataset.idle;
    const hover = text.dataset.hover;
    const click = text.dataset.click;

    let typingTimer = null;
    let isInitializing = false;

    function typeEffect(target) {
      if (isInitializing) return;
      clearInterval(typingTimer);

      text.textContent = '';
      let i = 0;

      typingTimer = setInterval(() => {
        text.textContent += target[i];
        i++;
        if (i >= target.length) clearInterval(typingTimer);
      }, 18);
    }

    cta.addEventListener('mouseenter', () => {
      typeEffect(hover);
    });

    cta.addEventListener('mouseleave', () => {
      typeEffect(idle);
    });

    cta.addEventListener('click', (e) => {
      e.preventDefault();
      isInitializing = true;

      clearInterval(typingTimer);
      text.textContent = click;

      cta.classList.add('initializing');

      setTimeout(() => {
        window.location.href = cta.href;
      }, 500);
    });
  </script>

</body>
</html>
