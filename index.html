<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeansOnCaffeine - Caffeinated AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* KEEP ALL YOUR EXISTING CSS ABOVE UNCHANGED */

    /* ── CTA (UPDATED ONLY THIS BLOCK) ── */
    .lp-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;

      padding: 18px 28px;
      border-radius: 14px;

      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;

      color: #8fb3ff;

      background: linear-gradient(180deg, rgba(10,20,45,0.95), rgba(5,12,28,0.95));
      border: 1px solid rgba(113,161,255,0.25);

      box-shadow:
        0 0 20px rgba(40,100,255,0.25),
        0 0 60px rgba(0,70,255,0.15),
        inset 0 0 10px rgba(113,161,255,0.05);

      position: relative;
      overflow: hidden;

      transition: all 0.2s ease;

      transform: none !important;
    }

    .lp-cta::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        transparent 0%,
        rgba(120,160,255,0.0) 35%,
        rgba(120,160,255,0.15) 50%,
        rgba(120,160,255,0.0) 65%,
        transparent 100%
      );
      transform: translateX(-140%);
      transition: transform 0.45s ease;
    }

    .lp-cta:hover::after {
      transform: translateX(140%);
    }

    .lp-cta:hover {
      color: #cfe0ff;
      border-color: rgba(140,190,255,0.6);

      box-shadow:
        0 0 30px rgba(60,130,255,0.4),
        0 0 100px rgba(0,90,255,0.25),
        inset 0 0 16px rgba(120,160,255,0.1);

      transform: none !important;
    }

    .lp-cta.initializing {
      color: #a8c4ff;

      box-shadow:
        0 0 40px rgba(80,140,255,0.6),
        0 0 140px rgba(0,100,255,0.35);
    }

    .lp-cta.initializing::after {
      transform: translateX(140%);
    }

    .lp-cta:active {
      transform: none !important;
    }

    /* KEEP ALL YOUR EXISTING CSS BELOW UNCHANGED */
  </style>
</head>

<body>

  <!-- KEEP YOUR FULL ORIGINAL BODY CONTENT -->

  <!-- CTA (UNCHANGED HTML STRUCTURE) -->
  <a href="https://jy1920a.github.io/BeansOnCaffeine/main.html" class="lp-cta" id="heroCta">
    <span id="ctaText"
          data-idle="System ready"
          data-hover="Enter the Lab"
          data-click="Initializing...">
      System ready
    </span>
  </a>

  <script>
    const cta = document.getElementById('heroCta');
    const text = document.getElementById('ctaText');

    const idle = text.dataset.idle;
    const hover = text.dataset.hover;
    const click = text.dataset.click;

    cta.addEventListener('mouseenter', () => {
      if (!cta.classList.contains('initializing')) {
        text.textContent = hover;
      }
    });

    cta.addEventListener('mouseleave', () => {
      if (!cta.classList.contains('initializing')) {
        text.textContent = idle;
      }
    });

    cta.addEventListener('click', (e) => {
      e.preventDefault();
      cta.classList.add('initializing');
      text.textContent = click;

      setTimeout(() => {
        window.location.href = cta.href;
      }, 500);
    });
  </script>

</body>
</html>
