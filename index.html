<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BeansOnCaffeine</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: radial-gradient(circle at 50% 30%, #0a0f1c, #020611 70%);
      color:#E1E0CC;
      font-family:'Inter', sans-serif;
      height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    /* HERO TITLE */
    .hero-title {
      font-family:'Bebas Neue', sans-serif;
      font-size: clamp(60px, 10vw, 110px);
      letter-spacing:0.04em;
      text-align:center;
      background: linear-gradient(180deg,#ffffff,#7fa4ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    /* SUB TEXT */
    .cta-caption {
      margin-top:18px;
      font-size:14px;
      color:rgba(220,220,220,0.55);
      text-align:center;
      max-width:420px;
    }

    /* CTA WRAPPER */
    .cta-wrap {
      display:flex;
      justify-content:center;
      margin-top:32px;
      width:100%;
      max-width:420px;
    }

    /* ───── UPDATED BUTTON ONLY ───── */
    .lp-cta {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;

      padding:18px 28px;
      border-radius:6px;

      font-family:'DM Mono', monospace;
      font-size:13px;
      letter-spacing:0.14em;
      text-transform:uppercase;
      text-decoration:none;

      color:#8fb3ff;

      background: linear-gradient(180deg, rgba(8,18,40,0.95), rgba(3,10,25,0.95));
      border:1px solid rgba(113,161,255,0.35);

      box-shadow:
        0 0 22px rgba(40,100,255,0.35),
        0 0 80px rgba(0,80,255,0.20),
        inset 0 0 12px rgba(113,161,255,0.06);

      position:relative;
      overflow:hidden;

      transition:all 0.2s ease;
    }

    /* light sweep */
    .lp-cta::after {
      content:'';
      position:absolute;
      inset:0;
      background: linear-gradient(
        110deg,
        transparent 0%,
        rgba(120,160,255,0.0) 35%,
        rgba(120,160,255,0.18) 50%,
        rgba(120,160,255,0.0) 65%,
        transparent 100%
      );
      transform: translateX(-140%);
      transition: transform 0.45s ease;
      pointer-events:none;
    }

    .lp-cta:hover::after {
      transform: translateX(140%);
    }

    .lp-cta:hover {
      color:#d6e4ff;
      border-color:rgba(140,190,255,0.7);

      box-shadow:
        0 0 35px rgba(70,140,255,0.55),
        0 0 120px rgba(0,90,255,0.30),
        inset 0 0 18px rgba(120,160,255,0.12);
    }

    .lp-cta.initializing {
      color:#b8d2ff;
      box-shadow:
        0 0 50px rgba(80,150,255,0.7),
        0 0 160px rgba(0,100,255,0.45);
    }

    /* cursor blink */
    .lp-cta.initializing span::after {
      content:" |";
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100% { opacity:0.6; }
      50% { opacity:0; }
    }

  </style>
</head>

<body>

  <div class="hero-title">
    Caffeinated AI
  </div>

  <div class="cta-caption">
    Systems. AI. Built to think clearly.
  </div>

  <div class="cta-wrap">
    <a href="https://jy1920a.github.io/BeansOnCaffeine/main.html" class="lp-cta" id="heroCta">
      <span id="ctaText"
            data-idle="System ready"
            data-hover="Enter the Lab"
            data-click="Initializing...">
        System ready
      </span>
    </a>
  </div>

  <script>
    const cta = document.getElementById('heroCta');
    const text = document.getElementById('ctaText');

    const idle = text.dataset.idle;
    const hover = text.dataset.hover;
    const click = text.dataset.click;

    cta.addEventListener('mouseenter', () => {
      if (!cta.classList.contains('initializing')) {
        text.textContent = hover;
      }
    });

    cta.addEventListener('mouseleave', () => {
      if (!cta.classList.contains('initializing')) {
        text.textContent = idle;
      }
    });

    cta.addEventListener('click', (e) => {
      e.preventDefault();
      cta.classList.add('initializing');
      text.textContent = click;

      setTimeout(() => {
        window.location.href = cta.href;
      }, 500);
    });
  </script>

</body>
</html>
